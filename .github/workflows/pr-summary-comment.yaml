name: PR Summary Comment

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  summary-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR summary comment
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PR_SUMMARY_COMMENT_TOKEN != '' && secrets.PR_SUMMARY_COMMENT_TOKEN || github.token }}
          script: |
            const marker = "<!-- nifi-flow-upgrade-advisor-pr-summary -->";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const names = files.map((file) => file.filename);
            const categories = [];
            const notes = [];

            const hasPrefix = (prefix) => names.some((name) => name.startsWith(prefix));
            const hasExact = (value) => names.includes(value);
            const hasWorkflow = hasPrefix(".github/workflows/");

            if (hasExact("README.md") || hasPrefix("docs/")) categories.push("docs");
            if (hasPrefix("cmd/") || hasPrefix("internal/")) categories.push("cli or engine");
            if (hasPrefix("examples/") || hasPrefix("demo/")) categories.push("examples or demos");
            if (hasPrefix("site/")) categories.push("website");
            if (hasPrefix("test/") || hasWorkflow) categories.push("tests or CI");
            if (hasExact("go.mod") || hasExact("go.sum")) categories.push("go modules");

            if (hasExact("go.mod") || hasExact("go.sum")) notes.push("Go toolchain or module graph changed");
            if (hasWorkflow || hasExact(".github/dependabot.yml")) notes.push("GitHub workflow or automation behavior changed");
            if (hasPrefix("examples/") || hasPrefix("demo/")) notes.push("Sample artifacts or demo flows changed");

            const docsChanged = names.filter((name) => name === "README.md" || name.startsWith("docs/"));
            const keyFiles = names.slice(0, 12).map((name) => `- \`${name}\``).join("\n");
            const typeLines = [
              "docs",
              "cli or engine",
              "examples or demos",
              "website",
              "tests or CI",
              "go modules",
              "other",
            ].map((label) => `- ${categories.includes(label) ? "[x]" : "[ ]"} ${label}`).join("\n");

            const body = `${marker}
            ## PR Summary

            Summary
            - ${files.length} changed file(s) across ${categories.length > 0 ? categories.join(", ") : "other"}.
            - Key files:
            ${keyFiles || "- none"}

            Type of Change
            ${typeLines}

            Validation
            - Automated summary only; please list the commands you ran in the PR description.

            Docs
            - ${docsChanged.length > 0 ? "docs updated in this PR" : "no docs update detected"}
            ${docsChanged.length > 0 ? docsChanged.map((name) => `- \`${name}\``).join("\n") : ""}

            Notes
            ${notes.length > 0 ? notes.map((note) => `- ${note}`).join("\n") : "- No special review notes inferred automatically."}
            `;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            try {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pull_number,
                  body,
                });
              }
            } catch (error) {
              if (error.status === 403) {
                const message = "Could not create or update the PR summary comment because the workflow token does not have comment write access. Check repository or organization Actions workflow permissions if you want this automation enabled.";
                core.warning(message);
                await core.summary
                  .addHeading("PR summary comment")
                  .addRaw(`- ${message}\n`)
                  .write();
              } else {
                throw error;
              }
            }
