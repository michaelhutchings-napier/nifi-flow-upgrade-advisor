name: desktop-tauri

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'desktop-app/**'
      - '.github/workflows/desktop-tauri.yaml'
      - 'README.md'
      - 'docs/design.md'
  pull_request:
    paths:
      - 'desktop-app/**'
      - '.github/workflows/desktop-tauri.yaml'
      - 'README.md'
      - 'docs/design.md'

permissions:
  contents: read

jobs:
  check-desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux desktop prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cargo fmt
        run: cargo fmt --all --check --manifest-path desktop-app/src-tauri/Cargo.toml

      - name: Cargo check
        run: cargo check --manifest-path desktop-app/src-tauri/Cargo.toml

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2.0"

      - name: Build Windows installer
        working-directory: desktop-app/src-tauri
        run: cargo tauri build --bundles nsis

      - name: Upload Windows desktop installer
        uses: actions/upload-artifact@v7
        with:
          name: nifi-flow-upgrade-advisor-desktop-windows-installer
          path: desktop-app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
