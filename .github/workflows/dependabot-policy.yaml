name: Dependabot Policy

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  classify:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      - name: Classify update
        uses: actions/github-script@v8
        env:
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        with:
          script: |
            const ecosystem = process.env.PACKAGE_ECOSYSTEM || "";
            const updateType = process.env.UPDATE_TYPE || "";
            const dependencies = (process.env.DEPENDENCY_NAMES || "")
              .split(",")
              .map((value) => value.trim())
              .filter(Boolean);

            const isRoutine =
              ecosystem === "github-actions" &&
              (updateType === "version-update:semver-patch" ||
               updateType === "version-update:semver-minor");

            const reviewProfile = isRoutine ? "routine" : "manual";

            await core.summary
              .addHeading("Dependabot policy")
              .addRaw(`- Package ecosystem: \`${ecosystem || "unknown"}\`\n`)
              .addRaw(`- Update type: \`${updateType || "unknown"}\`\n`)
              .addRaw(`- Dependencies: \`${dependencies.join(", ") || "unknown"}\`\n`)
              .addRaw(`- Suggested review profile: \`${reviewProfile}\`\n`)
              .write();
