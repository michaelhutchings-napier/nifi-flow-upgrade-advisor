name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'

      - name: Go test
        run: go test ./...

      - name: Go build
        run: |
          mkdir -p ./bin
          go build -o ./bin/nifi-flow-upgrade ./cmd/nifi-flow-upgrade

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
          out="nifi-flow-upgrade-${GOOS}-${GOARCH}${ext}"
          go build -ldflags "-X github.com/michaelhutchings-napier/nifi-flow-upgrade-advisor/internal/flowupgrade.Version=${GITHUB_REF_NAME} -X github.com/michaelhutchings-napier/nifi-flow-upgrade-advisor/internal/flowupgrade.Commit=${GITHUB_SHA} -X github.com/michaelhutchings-napier/nifi-flow-upgrade-advisor/internal/flowupgrade.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "dist/${out}" ./cmd/nifi-flow-upgrade

      - name: Archive binary
        run: |
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip "nifi-flow-upgrade-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "nifi-flow-upgrade-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            tar -czf "nifi-flow-upgrade-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "nifi-flow-upgrade-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  build-desktop-windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2.0"

      - name: Build desktop installer
        working-directory: desktop-app/src-tauri
        run: cargo tauri build --bundles nsis

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-desktop-windows-amd64
          path: desktop-app/src-tauri/target/release/bundle/nsis/*.exe

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-desktop-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" \) -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum ./* > checksums.txt

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b ./bin v1.22.0

      - name: Generate SBOM
        run: |
          ./bin/syft dir:. -o spdx-json=release/sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign checksums
        run: |
          cosign sign-blob --yes \
            --output-signature release/checksums.txt.sig \
            --bundle release/checksums.txt.sigstore.json \
            release/checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/*
