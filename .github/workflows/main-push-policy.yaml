name: Main Push Policy

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  require-pr-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether pushed commit is associated with a pull request
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commit = context.sha;

            const prs = await github.paginate(
              github.rest.repos.listPullRequestsAssociatedWithCommit,
              {
                owner,
                repo,
                commit_sha: commit,
                per_page: 100,
              }
            );

            const messageLines = [
              `- Branch: \`${context.ref.replace("refs/heads/", "")}\``,
              `- Commit: \`${commit}\``,
              `- Associated pull requests: \`${prs.length}\``,
            ];

            await core.summary
              .addHeading("Main branch push policy")
              .addRaw(messageLines.join("\n") + "\n")
              .write();

            if (prs.length === 0) {
              core.warning(
                "This push to the protected branch is not associated with any pull request. Use a branch and pull request workflow for changes to main."
              );
            }
