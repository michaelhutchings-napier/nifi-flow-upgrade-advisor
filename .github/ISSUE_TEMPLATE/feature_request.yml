name: Feature request
description: Suggest a new rule-pack capability, source format, publish target, or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Official source or migration note
      description: Link any Apache NiFi docs or migration guidance that supports the request.
