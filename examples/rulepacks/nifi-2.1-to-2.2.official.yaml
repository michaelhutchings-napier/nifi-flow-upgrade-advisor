apiVersion: flow-upgrade.nifi.advisor/v1alpha1
kind: RulePack
metadata:
  name: nifi-2.1-to-2.2-official
  title: NiFi 2.1 to 2.2 migration guidance
  description: Official compatibility coverage pack for the NiFi 2.1.x to 2.2.x upgrade step. Apache Migration Guidance does not list a dedicated caveat for this minor hop.
  references:
    - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
spec:
  sourceVersionRange: ">=2.1.0 <2.2.0"
  targetVersionRange: ">=2.2.0 <2.3.0"
  appliesToFormats:
    - flow-json-gz
    - versioned-flow-snapshot
    - git-registry-dir
    - nifi-registry-export
  rules: []
