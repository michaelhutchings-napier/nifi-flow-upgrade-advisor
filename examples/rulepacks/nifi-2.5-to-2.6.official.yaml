apiVersion: flow-upgrade.nifi.advisor/v1alpha1
kind: RulePack
metadata:
  name: nifi-2.5-to-2.6-official
  title: NiFi 2.5 to 2.6 migration guidance
  description: Official compatibility coverage pack for the NiFi 2.5.x to 2.6.x upgrade step. Apache Migration Guidance does not list a dedicated caveat for this minor hop.
  references:
    - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
spec:
  sourceVersionRange: ">=2.5.0 <2.6.0"
  targetVersionRange: ">=2.6.0 <2.7.0"
  appliesToFormats:
    - flow-json-gz
    - versioned-flow-snapshot
    - git-registry-dir
    - nifi-registry-export
  rules: []
