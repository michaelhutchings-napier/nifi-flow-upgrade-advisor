apiVersion: flow-upgrade.nifi.advisor/v1alpha1
kind: RulePack
metadata:
  name: nifi-2.5-to-2.6-official
  title: NiFi 2.5 to 2.6 migration guidance
  description: Official compatibility placeholder for the NiFi 2.5.x to 2.6.x upgrade step.
  references:
    - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
spec:
  sourceVersionRange: ">=2.5.0 <2.6.0"
  targetVersionRange: ">=2.6.0 <2.7.0"
  appliesToFormats:
    - flow-json-gz
    - versioned-flow-snapshot
    - git-registry-dir
    - nifi-registry-export
  rules:
    - id: core.2.5-to-2.6.guidance-review
      category: manual-inspection
      class: info
      severity: info
      message: Apache Migration Guidance does not list a dedicated 2.5.x to 2.6.x caveat in this rule pack.
      selector:
        scope: flow-root
      notes: Inference from the official Migration Guidance as of March 22, 2026. Continue with normal analyze, rewrite, and validate checks, plus live target validation where available.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
