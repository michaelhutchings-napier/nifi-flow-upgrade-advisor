apiVersion: flow-upgrade.nifi.advisor/v1alpha1
kind: RulePack
metadata:
  name: nifi-2.0-to-2.1-official
  title: NiFi 2.0 to 2.1 migration guidance
  description: Official compatibility coverage pack for the NiFi 2.0.x to 2.1.x upgrade step. Audited against Apache Migration Guidance and Apache NiFi 2.1.0 release notes; no flow-detectable official caveats were identified for this minor hop.
  references:
    - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
    - https://cwiki.apache.org/confluence/display/NIFI/Release%2BNotes
spec:
  sourceVersionRange: ">=2.0.0 <2.1.0"
  targetVersionRange: ">=2.1.0 <2.2.0"
  appliesToFormats:
    - flow-json-gz
    - versioned-flow-snapshot
    - git-registry-dir
    - nifi-registry-export
  rules: []
