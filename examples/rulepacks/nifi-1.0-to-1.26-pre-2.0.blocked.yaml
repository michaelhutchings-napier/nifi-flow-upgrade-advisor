apiVersion: flow-upgrade.nifi.advisor/v1alpha1
kind: RulePack
metadata:
  name: nifi-1.0-to-1.26-pre-2.0-blocked
  title: NiFi versions earlier than 1.27 require a bridge upgrade before 2.0
  description: Direct migration to NiFi 2.0 should not be attempted from source versions earlier than 1.27.0.
  references:
    - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
spec:
  sourceVersionRange: ">=1.0.0 <1.27.0"
  targetVersionRange: ">=2.0.0 <2.1.0"
  appliesToFormats:
    - flow-xml-gz
    - flow-json-gz
    - versioned-flow-snapshot
    - git-registry-dir
    - nifi-registry-export
  rules:
    - id: core.bridge-upgrade.requires-1.27
      category: blocked
      class: blocked
      severity: error
      message: Direct migration to NiFi 2.0.x is blocked for source versions earlier than 1.27.0.
      selector:
        scope: flow-root
      actions:
        - type: mark-blocked
      notes: Apache NiFi migration guidance requires upgrading to 1.27.0 before moving to 2.0.0. Analyze the flow again from a 1.27.x source artifact after that bridge upgrade.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
