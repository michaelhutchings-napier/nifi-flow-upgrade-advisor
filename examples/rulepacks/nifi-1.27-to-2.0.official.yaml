apiVersion: flow-upgrade.nifi.advisor/v1alpha1
kind: RulePack
metadata:
  name: nifi-1.27-to-2.0-official
  title: NiFi 1.27 to 2.0 migration guidance
  description: Initial official rule pack derived from Apache NiFi migration guidance for 1.27.x to 2.0.x upgrades.
  references:
    - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
spec:
  sourceVersionRange: ">=1.27.0 <2.0.0"
  targetVersionRange: ">=2.0.0 <2.1.0"
  appliesToFormats:
    - flow-xml-gz
    - flow-json-gz
    - versioned-flow-snapshot
    - git-registry-dir
    - nifi-registry-export
  rules:
    - id: core.distributed-map-cache-server.renamed
      category: component-replaced
      class: auto-fix
      severity: warning
      message: DistributedMapCacheServer was renamed for NiFi 2.0.x.
      selector:
        scope: controller-service
        componentType: org.apache.nifi.distributed.cache.server.map.DistributedMapCacheServer
      actions:
        - type: replace-component-type
          from: org.apache.nifi.distributed.cache.server.map.DistributedMapCacheServer
          to: org.apache.nifi.distributed.cache.server.map.MapCacheServer
      notes: Apache NiFi 2.0.0 renamed the Distributed Server and Client Services to MapCache and SetCache variants.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
        - https://nifi.apache.org/docs/nifi-docs/components/org.apache.nifi/nifi-distributed-cache-services-nar/1.12.1/org.apache.nifi.distributed.cache.server.map.DistributedMapCacheServer/index.html
        - https://nifi.apache.org/components/org.apache.nifi.distributed.cache.server.map.MapCacheServer/

    - id: core.distributed-set-cache-server.renamed
      category: component-replaced
      class: auto-fix
      severity: warning
      message: DistributedSetCacheServer was renamed for NiFi 2.0.x.
      selector:
        scope: controller-service
        componentType: org.apache.nifi.distributed.cache.server.DistributedSetCacheServer
      actions:
        - type: replace-component-type
          from: org.apache.nifi.distributed.cache.server.DistributedSetCacheServer
          to: org.apache.nifi.distributed.cache.server.SetCacheServer
      notes: Apache NiFi 2.0.0 renamed the Distributed Server and Client Services to MapCache and SetCache variants.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
        - https://nifi.apache.org/components/org.apache.nifi.distributed.cache.server.SetCacheServer/

    - id: core.distributed-map-cache-client.renamed
      category: component-replaced
      class: auto-fix
      severity: warning
      message: DistributedMapCacheClientService was renamed for NiFi 2.0.x.
      selector:
        scope: controller-service
        componentType: org.apache.nifi.distributed.cache.client.DistributedMapCacheClientService
      actions:
        - type: replace-component-type
          from: org.apache.nifi.distributed.cache.client.DistributedMapCacheClientService
          to: org.apache.nifi.distributed.cache.client.MapCacheClientService
      notes: Apache NiFi 2.0.0 renamed the Distributed Server and Client Services to MapCache and SetCache variants.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
        - https://nifi.apache.org/docs/nifi-docs/components/org.apache.nifi/nifi-distributed-cache-services-nar/1.5.0/org.apache.nifi.distributed.cache.client.DistributedMapCacheClientService/index.html
        - https://nifi.apache.org/components/org.apache.nifi.distributed.cache.client.MapCacheClientService/

    - id: core.distributed-set-cache-client.renamed
      category: component-replaced
      class: auto-fix
      severity: warning
      message: DistributedSetCacheClientService was renamed for NiFi 2.0.x.
      selector:
        scope: controller-service
        componentType: org.apache.nifi.distributed.cache.client.DistributedSetCacheClientService
      actions:
        - type: replace-component-type
          from: org.apache.nifi.distributed.cache.client.DistributedSetCacheClientService
          to: org.apache.nifi.distributed.cache.client.SetCacheClientService
      notes: Apache NiFi 2.0.0 renamed the Distributed Server and Client Services to MapCache and SetCache variants.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
        - https://nifi.apache.org/docs/nifi-docs/components/org.apache.nifi/nifi-distributed-cache-services-nar/1.28.0/org.apache.nifi.distributed.cache.client.DistributedSetCacheClientService/index.html
        - https://nifi.apache.org/components/org.apache.nifi.distributed.cache.client.SetCacheClientService/

    - id: core.variable-registry.removed
      category: variable-migration
      class: blocked
      severity: error
      message: Variable Registry expressions require explicit migration planning before NiFi 2.0.x.
      selector:
        scope: flow-root
      match:
        annotationContains: "#{"
      actions:
        - type: mark-blocked
      notes: Apache NiFi 2.0.0 removed the VARIABLE_REGISTRY expression language scope. Migrate these references to parameters, environment variables, or another supported pattern before import.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance

    - id: core.base64-encode-content.replace
      category: component-replaced
      class: auto-fix
      severity: warning
      message: Base64EncodeContent should be replaced with EncodeContent for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.Base64EncodeContent
      actions:
        - type: replace-component-type
          from: org.apache.nifi.processors.standard.Base64EncodeContent
          to: org.apache.nifi.processors.standard.EncodeContent
      notes: Apache's 2.0 migration guide describes EncodeContent as the direct replacement. The existing Mode property is preserved and EncodeContent keeps Base64 as the default encoding, so this replacement is treated as a safe mechanical rewrite.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.azure-queue-v12.required-20
      category: component-replaced
      class: manual-change
      severity: warning
      message: Legacy Azure Queue Storage processors should move to the v12 variants before NiFi 2.0.x.
      selector:
        scope: processor
        componentTypes:
          - org.apache.nifi.processors.azure.storage.queue.GetAzureQueueStorage
          - org.apache.nifi.processors.azure.storage.queue.PutAzureQueueStorage
      notes: Apache NiFi deprecated these processors in 1.22.0 in favor of GetAzureQueueStorage_v12 and PutAzureQueueStorage_v12. A 1.27.x flow can still contain the legacy components, so review them before the 2.0 step.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
        - https://cwiki.apache.org/confluence/display/NIFI/Deprecated%2BComponents%2Band%2BFeatures

    - id: core.execute-script.legacy-engines-20
      category: component-replaced
      class: manual-change
      severity: warning
      message: Deprecated ExecuteScript engines should be replaced before NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.script.ExecuteScript
      match:
        propertyValueIn:
          property: Script Engine
          values:
            - ECMAScript
            - lua
            - ruby
            - Jython
      notes: Apache NiFi deprecated these ExecuteScript engines in the 1.x line. Groovy is the preferred in-product replacement and native Python support is available in NiFi 2.0.0 for relevant use cases.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Deprecated%2BComponents%2Band%2BFeatures

    - id: core.ignite-cache.deprecated-20
      category: component-replaced
      class: manual-change
      severity: warning
      message: Ignite cache processors were deprecated for removal and should be reviewed before NiFi 2.0.x.
      selector:
        scope: processor
        componentTypes:
          - org.apache.nifi.processors.ignite.cache.GetIgniteCache
          - org.apache.nifi.processors.ignite.cache.PutIgniteCache
      notes: Apache NiFi deprecated GetIgniteCache and PutIgniteCache in 1.22.0 for removal in the 2.0 line. Review these flows and choose an alternative cache or service pattern before the major-version step.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
        - https://cwiki.apache.org/confluence/display/NIFI/Deprecated%2BComponents%2Band%2BFeatures

    - id: core.rethinkdb.deprecated-20
      category: component-replaced
      class: manual-change
      severity: warning
      message: RethinkDB processors were deprecated for removal and should be replaced before NiFi 2.0.x.
      selector:
        scope: processor
        componentTypes:
          - org.apache.nifi.processors.rethinkdb.GetRethinkDB
          - org.apache.nifi.processors.rethinkdb.PutRethinkDB
      notes: Apache NiFi deprecated RethinkDB processors in 1.23.0 for removal in 2.0.0. Review these flows and plan a replacement before the major-version step.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migration%2BGuidance
        - https://cwiki.apache.org/confluence/display/NIFI/Deprecated%2BComponents%2Band%2BFeatures

    - id: core.encrypt-content.deprecated-20
      category: component-replaced
      class: manual-change
      severity: warning
      message: EncryptContent should be replaced with EncryptContentAge or EncryptContentPGP before NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.EncryptContent
      notes: Apache NiFi deprecated EncryptContent in the 1.x line. Review each use of EncryptContent and choose the Age or PGP replacement that matches the existing encryption flow before upgrading to 2.0.0.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Deprecated%2BComponents%2Band%2BFeatures

    - id: core.convert-avro-to-json.deprecated-20
      category: component-replaced
      class: manual-change
      severity: warning
      message: ConvertAvroToJSON should be replaced with ConvertRecord before NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.avro.ConvertAvroToJSON
      notes: Apache NiFi deprecated ConvertAvroToJSON in 1.26.0 with ConvertRecord as the recommended alternative. A 1.27.x flow can still contain ConvertAvroToJSON, so review it before the 2.0 step.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Deprecated%2BComponents%2Band%2BFeatures

    - id: core.cassandra-session-provider.deprecated-20
      category: component-replaced
      class: manual-change
      severity: warning
      message: CassandraSessionProvider should be reviewed before NiFi 2.0.x.
      selector:
        scope: controller-service
        componentType: org.apache.nifi.service.CassandraSessionProvider
      notes: Apache NiFi deprecated CassandraSessionProvider in 1.26.0 because the underlying DataStax 3 driver is no longer current. Review dependent Cassandra flows before the 2.0 step.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Deprecated%2BComponents%2Band%2BFeatures

    - id: core.get-solr.deprecated-20
      category: component-replaced
      class: manual-change
      severity: warning
      message: GetSolr was deprecated for removal and should be reviewed before NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.solr.GetSolr
      notes: Apache NiFi deprecated GetSolr in 1.26.0 for later removal. Review Solr-based flows before the 2.0 step.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Deprecated%2BComponents%2Band%2BFeatures

    - id: core.get-http.replace
      category: component-replaced
      class: assisted-rewrite
      severity: warning
      message: GetHTTP should be replaced with InvokeHTTP for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.GetHTTP
      actions:
        - type: replace-component-type
          from: org.apache.nifi.processors.standard.GetHTTP
          to: org.apache.nifi.processors.standard.InvokeHTTP
        - type: rename-property
          from: URL
          to: HTTP URL
        - type: set-property-if-absent
          property: HTTP Method
          value: GET
        - type: set-property-if-absent
          property: Response FlowFile Naming Strategy
          value: URL_PATH
      notes: Apache's 2.0 migration guide maps GetHTTP to InvokeHTTP with HTTP Method GET, HTTP URL, and Response FlowFile Naming Strategy URL_PATH. The rewrite scaffolds those properties but still leaves timeout, SSL, and response-handling review visible to a human.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.get-jms-queue.replace
      category: component-replaced
      class: manual-change
      severity: warning
      message: GetJMSQueue should be replaced with ConsumeJMS for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.GetJMSQueue
      notes: Apache's 2.0 migration guide requires moving to ConsumeJMS with a JMSConnectionFactoryProvider and external JMS client libraries.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.get-jms-topic.replace
      category: component-replaced
      class: manual-change
      severity: warning
      message: GetJMSTopic should be replaced with ConsumeJMS for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.GetJMSTopic
      notes: Apache's 2.0 migration guide requires moving to ConsumeJMS with a JMSConnectionFactoryProvider, external JMS client libraries, and Destination Type TOPIC.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.get-twitter.replace
      category: component-replaced
      class: manual-change
      severity: warning
      message: GetTwitter should be replaced with ConsumeTwitter for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.twitter.GetTwitter
      notes: Apache's 2.0 migration guide says the replacement moves from Twitter API v1 and Hosebird Client to Twitter API v2 with OAuth 2 Bearer Token and possible external filter-rule setup.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.hash-attribute.replace
      category: component-replaced
      class: manual-change
      severity: warning
      message: HashAttribute should be replaced with UpdateAttribute or CryptographicHashAttribute for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.HashAttribute
      notes: Apache's 2.0 migration guide recommends expression-language hash functions in UpdateAttribute and highlights MD5 as unsuitable for cryptographic use.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.hash-content.replace
      category: component-replaced
      class: manual-change
      severity: warning
      message: HashContent should be replaced with CryptographicHashContent for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.HashContent
      notes: Apache's 2.0 migration guide maps HashContent to CryptographicHashContent, but equivalent attribute naming may also require an UpdateAttribute step.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.invoke-http.proxy-properties.replace
      category: property-renamed
      class: manual-change
      severity: warning
      message: InvokeHTTP proxy properties should be migrated to Proxy Configuration Service for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.InvokeHTTP
      match:
        propertyExists: Proxy Host
      notes: Apache's 2.0 migration guide requires creating a StandardProxyConfigurationService and moving deprecated proxy properties off the processor.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.post-http.replace
      category: component-replaced
      class: assisted-rewrite
      severity: warning
      message: PostHTTP should be replaced with InvokeHTTP for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.PostHTTP
      actions:
        - type: replace-component-type
          from: org.apache.nifi.processors.standard.PostHTTP
          to: org.apache.nifi.processors.standard.InvokeHTTP
        - type: rename-property
          from: URL
          to: HTTP URL
        - type: set-property-if-absent
          property: HTTP Method
          value: POST
      notes: Apache's 2.0 migration guide maps PostHTTP to InvokeHTTP. The rewrite scaffolds the target processor type and core request properties, but FlowFile packaging, HTTPS handling, and header behavior still need review.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0

    - id: core.put-jms.replace
      category: component-replaced
      class: manual-change
      severity: warning
      message: PutJMS should be replaced with PublishJMS for NiFi 2.0.x.
      selector:
        scope: processor
        componentType: org.apache.nifi.processors.standard.PutJMS
      notes: Apache's 2.0 migration guide requires moving to PublishJMS with a JMSConnectionFactoryProvider and external JMS client libraries.
      references:
        - https://cwiki.apache.org/confluence/display/NIFI/Migrating+Deprecated+Components+and+Features+for+2.0.0
